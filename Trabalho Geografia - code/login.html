<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema Escolar</title>
  <style>
    :root {
      --azul-claro: #f0f8ff;
      --azul: #2196f3;
      --azul-escuro: #0d47a1;
      --branco: #ffffff;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--azul), var(--azul-escuro));
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .login-container {
      background-color: var(--branco);
      border-radius: 12px;
      padding: 40px;
      width: 350px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: var(--azul);
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: var(--azul-escuro);
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--azul);
      border-radius: 8px;
      background-color: var(--azul-claro);
      color: var(--azul-escuro);
      transition: 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--azul-escuro);
      background-color: #eaf4ff;
    }

    input::placeholder {
      color: #666;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--azul), var(--azul-escuro));
      color: var(--branco);
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
    }

    .submit-btn:hover {
      background: linear-gradient(90deg, var(--azul-escuro), var(--azul));
      transform: scale(1.03);
    }

    .extra-links {
      text-align: center;
      margin-top: 15px;
    }

    .extra-links a {
      color: var(--azul);
      text-decoration: none;
      font-size: 0.9em;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login </h2>
    <form>
      <div class="form-group">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" placeholder="Digite seu usuário">
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha">
      </div>

      <button type="submit" class="submit-btn">Entrar</button>

      <div class="extra-links">
        <a href="#">Esqueceu a senha?</a> | <a href="#">Criar conta</a>
      </div>
    </form>
  </div>
</body>
</html>
